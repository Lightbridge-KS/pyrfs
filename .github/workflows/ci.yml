name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: make lint format-check typecheck

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: make docs

  readme:
    name: readme up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: make readme-check

  tests:
    name: pytest (py${{ matrix.python }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.13"]
        extras: [core, pandas]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Sync (core only)
        if: matrix.extras == 'core'
        run: uv sync
      - name: Sync (with pandas extra)
        if: matrix.extras == 'pandas'
        run: uv sync --extra pandas
      - run: uv run pytest
