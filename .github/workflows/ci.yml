name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy --strict pyfs

  tests:
    name: pytest (py${{ matrix.python }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.13"]
        extras: [core, pandas]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Sync (core only)
        if: matrix.extras == 'core'
        run: uv sync
      - name: Sync (with pandas extra)
        if: matrix.extras == 'pandas'
        run: uv sync --extra pandas
      - run: uv run pytest
